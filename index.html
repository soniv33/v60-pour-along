<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V60 Pour Along</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f0e0d" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f5f1eb" media="(prefers-color-scheme: light)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="V60" />
  <meta name="mobile-web-app-capable" content="yes" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e0d;
      --surface: #1a1917;
      --surface2: #242220;
      --border: #2e2c29;
      --text: #f0ece6;
      --text-muted: #7a756e;
      --text-dim: #4a4540;
      --pour: #c8965a;
      --pour-light: #e8b87a;
      --wait: #6b9e8a;
      --wait-light: #8bc0aa;
      --swirl: #8b7fc8;
      --done: #7ab87a;
      --warn: #c8a45a;
      --fast: #e87a7a;
      --radius-ring: 152px;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f1eb;
        --surface: #ffffff;
        --surface2: #ece7df;
        --border: #d4cec5;
        --text: #1c1a17;
        --text-muted: #706a61;
        --text-dim: #a09890;
        --pour: #a06830;
        --pour-light: #b47840;
        --wait: #3d7a60;
        --wait-light: #4d8a70;
        --swirl: #5a54b0;
        --done: #3a8a50;
        --warn: #a08030;
        --fast: #c05050;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    /* ── SCREENS ── */
    .screen {
      display: none; width: 100%; max-width: 420px;
      flex-direction: column; align-items: center; gap: 20px;
    }
    .screen.active { display: flex; }
    #screen-brew {
      height: calc(100dvh - 44px);
      overflow-y: auto;
    }
    #screen-brew .btn-row { margin-top: auto; }

    /* ── INTRO ── */
    .intro-header { text-align: center; }
    .intro-title {
      font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-muted); font-weight: 500;
    }
    .intro-sub {
      font-size: 0.6rem; letter-spacing: 0.06em; color: var(--text-dim);
      font-weight: 300; margin-top: 4px;
    }

    /* ── RECIPE PICKER ── */
    .recipe-picker { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .recipe-pill {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 6px; color: var(--text-muted);
      cursor: pointer; text-align: center; line-height: 1.3;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .recipe-pill .rp-name  { font-size: 0.78rem; }
    .recipe-pill .rp-author { font-size: 0.58rem; color: var(--text-dim); margin-top: 2px; }
    .recipe-pill.active {
      background: var(--surface2); border-color: var(--pour); color: var(--text);
    }
    .recipe-pill.active .rp-author { color: var(--pour); }

    /* ── DOSE SELECTOR ── */
    .dose-selector { width: 100%; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; }
    .dose-btn {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 10px 6px; color: var(--text-muted); cursor: pointer; text-align: center;
      transition: background 0.2s, border-color 0.2s, color 0.2s; line-height: 1.3;
    }
    .dose-btn .dose-name { font-size: 0.84rem; }
    .dose-btn .dose-ratio { font-size: 0.68rem; color: var(--text-dim); margin-top: 2px; }
    .dose-btn.active {
      background: var(--surface2); border-color: var(--pour);
      color: var(--text);
    }
    .dose-btn.active .dose-ratio { color: var(--pour); }

    /* ── RECIPE CARD ── */
    .recipe-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 13px 16px; width: 100%; display: flex; flex-direction: column; gap: 9px;
    }
    .rc-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .rc-amounts { display: flex; gap: 8px; }
    .rc-amount-col { flex: 1; display: flex; flex-direction: column; gap: 5px; align-items: center; }
    .rc-amount-col .rc-label { align-self: flex-start; }
    .rc-label {
      font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-muted); flex-shrink: 0;
    }
    .rc-value { font-size: 1.3rem; font-weight: 300; color: var(--text); }
    .rc-muted { font-size: 0.8rem; color: var(--text-muted); }
    .rc-stepper { display: flex; align-items: center; gap: 7px; }
    .rc-stepper-val { font-size: 1.3rem; font-weight: 300; color: var(--text); min-width: 2.8ch; text-align: center; }
    .rc-stepper-unit { font-size: 0.8rem; color: var(--text-muted); }
    .step-btn {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 6px; width: 26px; height: 26px; font-size: 1rem; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .step-btn:hover { border-color: var(--pour); color: var(--pour); }
    .step-btn:active { background: var(--surface2); }
    .rc-link { display: flex; align-items: center; gap: 8px; }
    .rc-link-line { flex: 1; height: 1px; background: var(--border); }
    .rc-link-text { font-size: 0.58rem; letter-spacing: 0.06em; color: var(--text-dim); white-space: nowrap; }
    .rc-grind-block { display: flex; flex-direction: column; gap: 6px; }
    .rc-grind { display: flex; gap: 5px; }
    .grind-pill {
      flex: 1; background: none; border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 20px; padding: 4px 4px; font-size: 0.68rem; cursor: pointer; text-align: center;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .grind-pill.active { background: var(--surface2); border-color: var(--pour); color: var(--text); }

    /* ── LAST BREW ── */
    .last-brew {
      width: 100%; padding: 11px 15px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 11px;
      display: none; align-items: center; justify-content: space-between;
    }
    .last-brew-label { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
    .lb-right { display: flex; align-items: center; gap: 10px; }
    .lb-time { font-size: 1.1rem; font-weight: 300; font-variant-numeric: tabular-nums; }
    .lb-verdict { font-size: 0.72rem; color: var(--text-dim); }

    /* ── CIRCLE ── */
    .circle-wrap {
      position: relative;
      width: calc(var(--radius-ring) * 2);
      height: calc(var(--radius-ring) * 2);
      flex-shrink: 0;
    }
    .circle-wrap.clickable { cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
    .circle-wrap svg.ring {
      position: absolute; inset: 0; width: 100%; height: 100%;
      transform: rotate(-90deg); overflow: visible;
    }
    .ring-bg { fill: none; stroke: var(--border); stroke-width: 3; }
    .ring-progress {
      fill: none; stroke: var(--pour); stroke-width: 3; stroke-linecap: round;
      transition: stroke-dashoffset 0.35s linear, stroke 0.4s ease;
    }
    .circle-inner {
      position: absolute; inset: 12px; border-radius: 50%;
      background: var(--surface); border: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 2px; transition: background 0.25s ease;
    }
    .clickable:hover .circle-inner,
    .clickable:active .circle-inner { background: var(--surface2); }

    .circle-label { font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); }
    .circle-action { font-size: 1.8rem; font-weight: 300; letter-spacing: -0.02em; color: var(--text); line-height: 1; }
    .circle-timer {
      font-size: 2.8rem; font-weight: 200; letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums; color: var(--text); line-height: 1;
    }
    .circle-sublabel {
      font-size: 0.6rem; letter-spacing: 0.08em; color: var(--text-muted);
      text-align: center; padding: 0 14px; line-height: 1.4;
    }

    @keyframes ring-pulse {
      0%, 100% { filter: drop-shadow(0 0 5px color-mix(in srgb, var(--pour) 35%, transparent)); }
      50%       { filter: drop-shadow(0 0 16px color-mix(in srgb, var(--pour) 65%, transparent)); }
    }
    .circle-wrap.pouring svg.ring { animation: ring-pulse 2s ease-in-out infinite; }
    #brew-circle { cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; }
    .circle-pause-icon {
      position: absolute; display: none; pointer-events: none;
      align-items: center; justify-content: center; gap: 5px;
    }
    .circle-pause-icon::before, .circle-pause-icon::after {
      content: ''; display: block; width: 4px; height: 20px;
      background: var(--text-muted); border-radius: 2px;
    }
    .circle-wrap.paused .circle-pause-icon { display: flex; }
    .circle-wrap.paused .circle-timer,
    .circle-wrap.paused .circle-label { opacity: 0.18; }
    .circle-wrap.paused svg.ring { animation-play-state: paused; opacity: 0.5; }

    /* ── BREW SCREEN ── */
    .brew-top { width: 100%; display: flex; justify-content: space-between; align-items: flex-start; }
    .brew-top-left { display: flex; flex-direction: column; gap: 2px; }
    .brew-top-title { font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); }
    .brew-total-elapsed { font-size: 0.65rem; color: var(--text-dim); font-variant-numeric: tabular-nums; }
    .brew-top-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .brew-top-step { font-size: 0.65rem; color: var(--text-dim); }

    /* ── TRACK ── */
    .steps-track { width: 100%; display: flex; gap: 4px; }
    .track-seg {
      flex: 1; height: 3px; border-radius: 2px; background: var(--border);
      overflow: hidden; position: relative;
    }
    .track-seg-fill { position: absolute; inset: 0; width: 0%; border-radius: 2px; }
    .track-seg.pour  .track-seg-fill { background: var(--pour); }
    .track-seg.wait  .track-seg-fill { background: var(--wait); }
    .track-seg.swirl .track-seg-fill { background: var(--swirl); }
    .track-seg.done  .track-seg-fill { background: var(--done); }
    .track-seg.complete .track-seg-fill { width: 100%; }
    .track-seg.active .track-seg-fill { width: 40%; animation: pulse-track 1.4s ease-in-out infinite; }
    @keyframes pulse-track { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── STEP DISPLAY ── */
    .step-display {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px 18px; min-height: 120px;
      display: flex; flex-direction: column; justify-content: center; gap: 5px;
      transition: border-color 0.3s ease;
    }
    .step-display.pour  { border-color: color-mix(in srgb, var(--pour)  40%, transparent); }
    .step-display.wait  { border-color: color-mix(in srgb, var(--wait)  40%, transparent); }
    .step-display.swirl { border-color: color-mix(in srgb, var(--swirl) 40%, transparent); }

    .step-type-tag { font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600; }
    .step-type-tag.pour  { color: var(--pour-light); }
    .step-type-tag.wait  { color: var(--wait-light); }
    .step-type-tag.swirl { color: var(--swirl); }

    .step-instruction { font-size: 1rem; font-weight: 300; color: var(--text); line-height: 1.5; }
    .step-weight { font-size: 0.82rem; color: var(--pour); margin-top: 1px; min-height: 1.1em; }

    /* ── NEXT STEP ── */
    .next-step {
      width: 100%; padding: 10px 14px; background: transparent;
      border: 1px dashed var(--border); border-radius: 11px;
      display: flex; align-items: center; gap: 10px;
    }
    .next-step-label { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); flex-shrink: 0; }
    .next-step-text { font-size: 0.8rem; color: var(--text-muted); line-height: 1.35; }

    /* ── BUTTONS ── */
    .btn-row { display: flex; gap: 9px; width: 100%; }
    .btn-ghost {
      flex: 1; background: none; border: 1px solid var(--border); color: var(--text-muted);
      font-size: 0.78rem; padding: 9px 14px; border-radius: 9px; cursor: pointer;
      letter-spacing: 0.05em; transition: border-color 0.2s, color 0.2s;
    }
    .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }

    .btn-skip {
      flex: 2; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      font-size: 0.82rem; padding: 9px 14px; border-radius: 9px; cursor: pointer;
      letter-spacing: 0.05em; display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s; -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .btn-skip:hover { border-color: var(--text-dim); }

    /* ── RECAP ── */
    .recap-header { text-align: center; width: 100%; }
    .recap-eyebrow { font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); }
    .recap-time {
      font-size: 3.4rem; font-weight: 200; letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums; margin: 6px 0 4px;
    }
    .recap-verdict { font-size: 0.88rem; font-weight: 400; }
    .recap-verdict.good { color: var(--done); }
    .recap-verdict.warn { color: var(--warn); }
    .recap-verdict.bad  { color: var(--fast); }

    .recap-rows { width: 100%; display: flex; flex-direction: column; gap: 6px; }
    .recap-row {
      display: flex; align-items: center; padding: 9px 13px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 9px; gap: 9px;
    }
    .recap-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .recap-dot.pour  { background: var(--pour); }
    .recap-dot.wait  { background: var(--wait); }
    .recap-dot.swirl { background: var(--swirl); }
    .recap-row-name { font-size: 0.82rem; color: var(--text-muted); flex: 1; }
    .recap-row-actual { font-size: 0.86rem; font-variant-numeric: tabular-nums; }
    .recap-row-target { font-size: 0.7rem; color: var(--text-dim); font-variant-numeric: tabular-nums; margin-left: 4px; }
    .recap-total {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 13px; border-top: 1px solid var(--border); width: 100%;
    }
    .recap-total-label { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
    .recap-total-time { font-size: 1.1rem; font-weight: 300; font-variant-numeric: tabular-nums; }

    .recap-tip {
      width: 100%; padding: 13px 16px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px;
      font-size: 0.83rem; color: var(--text-muted); line-height: 1.55;
    }
    .recap-tip strong { color: var(--text); font-weight: 500; }

    .btn-primary {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: 0.9rem; padding: 13px; border-radius: 12px;
      cursor: pointer; letter-spacing: 0.06em; transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--surface2); }


    /* ── RESPONSIVE ── */
    @media (max-height: 730px) {
      :root { --radius-ring: 124px; }
      .screen { gap: 14px; }
      body { padding: 14px; }
      .circle-timer { font-size: 2.4rem; }
    }
  </style>
</head>
<body>

<!-- ── INTRO SCREEN ── -->
<div class="screen active" id="screen-intro">
  <div class="intro-header">
    <div class="intro-title">V60 Pour Along</div>
    <div class="intro-sub" id="intro-sub"></div>
  </div>

  <div class="recipe-picker" id="recipe-picker"></div>

  <div class="dose-selector" id="dose-selector"></div>

  <div class="recipe-card">
    <div class="rc-amounts">
      <div class="rc-amount-col">
        <span class="rc-label">Coffee</span>
        <div class="rc-stepper">
          <button class="step-btn" onclick="adjustCoffee(-1)">−</button>
          <span class="rc-stepper-val" id="rc-coffee">15</span>
          <span class="rc-stepper-unit">g</span>
          <button class="step-btn" onclick="adjustCoffee(1)">+</button>
        </div>
      </div>
      <div class="rc-amount-col">
        <span class="rc-label">Water</span>
        <div class="rc-stepper">
          <button class="step-btn" onclick="adjustWater(-5)">−</button>
          <span class="rc-stepper-val" id="rc-water">250</span>
          <span class="rc-stepper-unit">g</span>
          <button class="step-btn" onclick="adjustWater(5)">+</button>
        </div>
      </div>
    </div>
    <div class="rc-link">
      <div class="rc-link-line"></div>
      <span class="rc-link-text">ratio · auto-adjusts</span>
      <div class="rc-link-line"></div>
    </div>
    <div class="rc-grind-block">
      <span class="rc-label">Grind</span>
      <div class="rc-grind">
        <button class="grind-pill" onclick="setGrind(0)">Fine</button>
        <button class="grind-pill active" onclick="setGrind(1)">Med-Fine</button>
        <button class="grind-pill" onclick="setGrind(2)">Medium</button>
        <button class="grind-pill" onclick="setGrind(3)">Coarse</button>
      </div>
    </div>
    <div class="rc-link"><div class="rc-link-line"></div></div>
    <div class="rc-row">
      <span class="rc-label">Target time</span>
      <span class="rc-value" id="rc-target"></span>
    </div>
  </div>

  <div class="last-brew" id="last-brew">
    <div class="last-brew-label">Last brew</div>
    <div class="lb-right">
      <span class="lb-time" id="lb-time"></span>
      <span class="lb-verdict" id="lb-verdict"></span>
      <span class="lb-verdict" id="lb-grind"></span>
    </div>
  </div>

  <div class="circle-wrap clickable" onclick="startBrew()">
    <svg class="ring" viewBox="0 0 304 304">
      <circle class="ring-bg" cx="152" cy="152" r="144"/>
    </svg>
    <div class="circle-inner">
      <div class="circle-action">Go</div>
    </div>
  </div>

</div>

<!-- ── BREW SCREEN ── -->
<div class="screen" id="screen-brew">
  <div class="brew-top">
    <div class="brew-top-left">
      <div class="brew-top-title">V60 Pour Along</div>
      <div class="brew-total-elapsed" id="brew-total">0:00 total</div>
    </div>
    <div class="brew-top-right">
      <div id="step-counter" class="brew-top-step">Step 1 of 6</div>
    </div>
  </div>

  <div class="steps-track" id="steps-track"></div>

  <div class="step-display" id="step-display">
    <div class="step-type-tag pour" id="step-tag">Pour</div>
    <div class="step-instruction" id="step-instruction">Loading…</div>
    <div class="step-weight" id="step-weight"></div>
  </div>

  <div class="circle-wrap" id="brew-circle">
    <svg class="ring" viewBox="0 0 304 304">
      <circle class="ring-bg" cx="152" cy="152" r="144"/>
      <circle class="ring-progress" id="ring-progress" cx="152" cy="152" r="144"/>
    </svg>
    <div class="circle-inner">
      <div class="circle-label" id="brew-label">remaining</div>
      <div class="circle-timer" id="brew-timer">0:00</div>
      <div class="circle-pause-icon"></div>
    </div>
  </div>

  <div class="next-step" id="next-step-box">
    <div class="next-step-label">Next</div>
    <div class="next-step-text" id="next-step-text">–</div>
  </div>

  <div class="btn-row">
    <button class="btn-ghost" onclick="resetBrew()">Start over</button>
    <button class="btn-skip" id="skip-btn">Skip →</button>
  </div>
</div>

<!-- ── RECAP SCREEN ── -->
<div class="screen" id="screen-recap">
  <div class="recap-header">
    <div class="recap-eyebrow">Brew complete</div>
    <div class="recap-time" id="recap-time">3:15</div>
    <div class="recap-verdict" id="recap-verdict"></div>
  </div>

  <div class="recap-rows" id="recap-rows"></div>

  <div class="recap-tip" id="recap-tip"></div>

  <button class="btn-primary" onclick="resetBrew()">Brew again</button>
</div>

<script>
  // ── RECIPES ─────────────────────────────────────────────────────────
  const RECIPES = [
    {
      name: 'Ultimate One-Cup',
      author: 'James Hoffmann',
      doses: [
        { name: '1 cup',   coffee: 15, water: 250 },
        { name: '1½ cups', coffee: 22, water: 370 },
        { name: '2 cups',  coffee: 30, water: 500 },
      ],
      targetRange: [180, 210],
      thresholds: [150, 180, 210, 250],
      getSteps(coffee, water) {
        const scale = water / 250;
        const bloom = Math.round(50  * scale);
        const mid   = Math.round(150 * scale);
        return [
          { type: 'pour',  tag: 'Bloom',      duration: 10, weight: `→ ${bloom}g`,
            instruction: `Pour ${bloom}g in slow spirals from the center outward. Wet every ground.` },
          { type: 'swirl', tag: 'Swirl',      duration: 8,  weight: null,
            instruction: 'Gently swirl the V60 so all grounds are evenly saturated. A few slow rotations.' },
          { type: 'wait',  tag: 'Bloom wait', duration: 27, weight: null,
            instruction: 'Wait. Watch the coffee dome de-gas. Total bloom time ~45 seconds from the start.' },
          { type: 'pour',  tag: 'First pour', duration: 30, weight: `→ ${mid}g`,
            instruction: `Pour slowly in circles from center outward. Take ~30 seconds to reach ${mid}g.` },
          { type: 'pour',  tag: 'Final pour', duration: 30, weight: `→ ${water}g`,
            instruction: `Continue pouring in slow circles to reach ${water}g. Steady and even.` },
          { type: 'swirl', tag: 'Swirl',      duration: 8,  weight: null,
            instruction: 'Give the V60 a gentle swirl to level the bed before drawdown.' },
          { type: 'wait',  tag: 'Drawdown',   duration: 90, weight: null,
            instruction: 'Let the coffee drain fully. The bed should be flat when done. Tap Finish when dry.' },
        ];
      },
    },
    {
      name: '4:6 Method',
      author: 'Tetsu Kasuya',
      doses: [
        { name: '1 cup',   coffee: 15, water: 225 },
        { name: '1½ cups', coffee: 20, water: 300 },
        { name: '2 cups',  coffee: 30, water: 450 },
      ],
      targetRange: [240, 300],
      thresholds: [195, 240, 300, 360],
      getSteps(coffee, water) {
        const p = Math.round(water / 5);
        return [
          { type: 'pour', tag: 'Pour 1',   duration: 10, weight: `→ ${p}g`,
            instruction: `Pour ${p}g (20%) evenly over all grounds. This sets sweetness and body.` },
          { type: 'wait', tag: 'Wait',      duration: 40, weight: null,
            instruction: 'Wait for water to drain almost completely. Skip early if the bed is nearly dry.' },
          { type: 'pour', tag: 'Pour 2',   duration: 15, weight: `→ ${p * 2}g`,
            instruction: `Pour another ${p}g to reach ${p * 2}g. Completes the flavor control phase.` },
          { type: 'wait', tag: 'Wait',      duration: 40, weight: null,
            instruction: 'Wait for water to drain almost completely. Skip early if the bed is nearly dry.' },
          { type: 'pour', tag: 'Pour 3',   duration: 15, weight: `→ ${p * 3}g`,
            instruction: `Pour ${p}g to reach ${p * 3}g. Strength phase begins — keep pours consistent.` },
          { type: 'wait', tag: 'Wait',      duration: 40, weight: null,
            instruction: 'Wait for water to drain almost completely. Skip early if the bed is nearly dry.' },
          { type: 'pour', tag: 'Pour 4',   duration: 15, weight: `→ ${p * 4}g`,
            instruction: `Pour ${p}g to reach ${p * 4}g. Steady pace throughout.` },
          { type: 'wait', tag: 'Wait',      duration: 40, weight: null,
            instruction: 'Wait for water to drain almost completely. Skip early if the bed is nearly dry.' },
          { type: 'pour', tag: 'Pour 5',   duration: 15, weight: `→ ${water}g`,
            instruction: `Final pour — reach ${water}g total. Let this last pour define the strength.` },
          { type: 'wait', tag: 'Drawdown', duration: 60, weight: null,
            instruction: 'Let the coffee drain fully. The bed should be flat when done. Tap Finish when dry.' },
        ];
      },
    },
    {
      name: 'April',
      author: 'Patrik Rolf',
      doses: [
        { name: '1 cup',   coffee: 15, water: 250 },
        { name: '1½ cups', coffee: 20, water: 335 },
        { name: '2 cups',  coffee: 30, water: 500 },
      ],
      targetRange: [165, 195],
      thresholds: [135, 165, 195, 235],
      getSteps(coffee, water) {
        const bloom = Math.round(water * 0.18);
        const mid1  = Math.round(water * 0.60);
        const mid2  = Math.round(water * 0.80);
        return [
          { type: 'pour', tag: 'Bloom',       duration: 10, weight: `→ ${bloom}g`,
            instruction: `Pour ${bloom}g in a gentle spiral to wet all grounds evenly.` },
          { type: 'wait', tag: 'Bloom wait',  duration: 35, weight: null,
            instruction: 'Wait for the bloom to settle. Aim for ~45 seconds total from the start.' },
          { type: 'pour', tag: 'Second pour', duration: 30, weight: `→ ${mid1}g`,
            instruction: `Pour steadily to ${mid1}g, spiralling from centre outward.` },
          { type: 'pour', tag: 'Third pour',  duration: 20, weight: `→ ${mid2}g`,
            instruction: `Continue to ${mid2}g in a slow, even stream.` },
          { type: 'pour', tag: 'Final pour',  duration: 20, weight: `→ ${water}g`,
            instruction: `Finish at ${water}g. Keep the pour gentle and controlled.` },
          { type: 'wait', tag: 'Drawdown',    duration: 75, weight: null,
            instruction: 'Let the coffee drain fully. The bed should be flat when done. Tap Finish when dry.' },
        ];
      },
    },
    {
      name: 'Classic',
      author: 'Scott Rao',
      doses: [
        { name: '1 cup',   coffee: 15, water: 250 },
        { name: '1½ cups', coffee: 20, water: 335 },
        { name: '2 cups',  coffee: 30, water: 500 },
      ],
      targetRange: [150, 180],
      thresholds: [120, 150, 180, 220],
      getSteps(coffee, water) {
        const bloom = Math.round(water * 0.2);
        const rest  = water - bloom;
        return [
          { type: 'pour', tag: 'Bloom',      duration: 10, weight: `→ ${bloom}g`,
            instruction: `Pour ${bloom}g to saturate all grounds. Start at center and spiral outward.` },
          { type: 'wait', tag: 'Bloom wait', duration: 35, weight: null,
            instruction: "Let the bloom de-gas. Watch the dome rise and settle." },
          { type: 'pour', tag: 'Main pour',  duration: 45, weight: `→ ${water}g`,
            instruction: `Pour the remaining ${rest}g in a slow, steady spiral. Take the full 60 seconds.` },
          { type: 'wait', tag: 'Drawdown',   duration: 75, weight: null,
            instruction: 'Let the coffee drain fully. The bed should be flat when done. Tap Finish when dry.' },
        ];
      },
    },
  ];

  const CIRCUMFERENCE = 2 * Math.PI * 144; // matches r=144

  // ── STATE ───────────────────────────────────────────────────────────
  let currentRecipe    = 0;
  let currentDose      = 0;
  let customCoffee     = 15;
  let customWater      = 250;
  let currentRatio     = 250 / 15;
  let currentGrind     = 1;
  let STEPS            = [];

  let startTime        = null;
  let rafId            = null;
  let currentStepIdx   = 0;
  let stepStartTime    = 0;
  let stepEntryElapsed = [0];
  let paused           = false;
  let pauseStartMs     = null;
  let pausedTotalMs    = 0;

  // ── DOM ─────────────────────────────────────────────────────────────
  const screenIntro  = document.getElementById('screen-intro');
  const screenBrew   = document.getElementById('screen-brew');
  const screenRecap  = document.getElementById('screen-recap');
  const brewTimer    = document.getElementById('brew-timer');
  const brewTotal    = document.getElementById('brew-total');
  const brewLabel    = document.getElementById('brew-label');
  const stepCounter  = document.getElementById('step-counter');
  const stepDisplay  = document.getElementById('step-display');
  const stepTag      = document.getElementById('step-tag');
  const stepInstr    = document.getElementById('step-instruction');
  const stepWeight   = document.getElementById('step-weight');
  const nextStepBox  = document.getElementById('next-step-box');
  const nextStepText = document.getElementById('next-step-text');
  const ringProgress = document.getElementById('ring-progress');
  const stepsTrack   = document.getElementById('steps-track');
  const brewCircle   = document.getElementById('brew-circle');
  const skipBtn      = document.getElementById('skip-btn');

  // ── HELPERS ─────────────────────────────────────────────────────────
  function fmtTime(s) {
    s = Math.max(0, s);
    return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
  }

  function now() {
    const activePause = paused && pauseStartMs ? Date.now() - pauseStartMs : 0;
    return (Date.now() - startTime - pausedTotalMs - activePause) / 1000;
  }

  function doseScale() {
    return customWater / RECIPES[currentRecipe].doses[0].water;
  }

  function updateTargetDisplay() {
    const scale = doseScale();
    const [tMin, tMax] = RECIPES[currentRecipe].targetRange.map(t => Math.round(t * scale));
    document.getElementById('rc-target').innerHTML =
      `${fmtTime(tMin)} <span class="rc-muted">– ${fmtTime(tMax)}</span>`;
  }

  function verdictInfo(secs) {
    const scale = doseScale();
    const [t1, t2, t3, t4] = RECIPES[currentRecipe].thresholds.map(t => Math.round(t * scale));
    if (secs < t1)  return { text: 'Very fast — way under target',         cls: 'bad',  short: 'very fast',    tip: 'bad_fast' };
    if (secs < t2)  return { text: 'A touch fast — try slightly finer',    cls: 'warn', short: 'a touch fast', tip: 'warn_fast' };
    if (secs <= t3) return { text: 'Right in the zone',                    cls: 'good', short: 'in the zone',  tip: 'good' };
    if (secs <= t4) return { text: 'A touch slow — try slightly coarser',  cls: 'warn', short: 'a touch slow', tip: 'warn_slow' };
    return            { text: 'Very slow — try a coarser grind',           cls: 'bad',  short: 'very slow',    tip: 'bad_slow' };
  }

  // ── AUDIO ───────────────────────────────────────────────────────────
  let audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function unlockAudio() {
    try {
      const ctx = getAudioCtx();
      const buf = ctx.createBuffer(1, 1, 22050);
      const src = ctx.createBufferSource();
      src.buffer = buf;
      src.connect(ctx.destination);
      src.start(0);
    } catch (e) {}
  }

  function playChime(freqs, offsets, vol = 0.22) {
    try {
      const ctx = getAudioCtx();
      freqs.forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        const t = ctx.currentTime + (offsets[i] || 0);
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(vol, t + 0.008);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 1.1);
        osc.start(t);
        osc.stop(t + 1.1);
      });
    } catch (e) {}
  }

  function playStepChime() { playChime([880], [0]); }
  function playDoneChime() { playChime([523, 659, 784], [0, 0.18, 0.36], 0.2); }

  // ── VIBRATION ───────────────────────────────────────────────────────
  function vibe(pattern) {
    try { navigator.vibrate && navigator.vibrate(pattern); } catch (e) {}
  }

  // ── WAKE LOCK ───────────────────────────────────────────────────────
  let wakeLock = null;

  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
    } catch (e) {}
  }

  function releaseWakeLock() {
    if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
  }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && startTime && !wakeLock) requestWakeLock();
  });

  // ── HISTORY ─────────────────────────────────────────────────────────
  function saveHistory(totalSecs) {
    try {
      const history = JSON.parse(localStorage.getItem('v60-history') || '[]');
      history.unshift({ totalSecs, short: verdictInfo(totalSecs).short, grind: currentGrind, date: Date.now() });
      localStorage.setItem('v60-history', JSON.stringify(history.slice(0, 10)));
    } catch (e) {}
  }

  function loadHistory() {
    try {
      const history = JSON.parse(localStorage.getItem('v60-history') || '[]');
      if (history.length > 0) {
        const last = history[0];
        const grindNames = ['Fine', 'Med-Fine', 'Medium', 'Coarse'];
        document.getElementById('lb-time').textContent    = fmtTime(last.totalSecs);
        document.getElementById('lb-verdict').textContent = last.short;
        document.getElementById('lb-grind').textContent   = grindNames[last.grind] ?? '';
        document.getElementById('last-brew').style.display = 'flex';
      }
    } catch (e) {}
  }

  // ── RECIPE PICKER ───────────────────────────────────────────────────
  function buildRecipePicker() {
    const container = document.getElementById('recipe-picker');
    RECIPES.forEach((r, i) => {
      const pill = document.createElement('button');
      pill.className = 'recipe-pill' + (i === 0 ? ' active' : '');
      pill.innerHTML = `<div class="rp-name">${r.name}</div><div class="rp-author">${r.author}</div>`;
      pill.onclick = () => setRecipe(i);
      container.appendChild(pill);
    });
  }

  function setRecipe(idx) {
    currentRecipe = idx;
    document.querySelectorAll('.recipe-pill').forEach((p, i) => p.classList.toggle('active', i === idx));
    document.getElementById('intro-sub').textContent = RECIPES[idx].author;
    buildDoseButtons();
    setDose(0);
  }

  // ── DOSE SELECTOR ───────────────────────────────────────────────────
  function buildDoseButtons() {
    const container = document.getElementById('dose-selector');
    const doses = RECIPES[currentRecipe].doses;
    container.innerHTML = '';
    doses.forEach((d, i) => {
      const btn = document.createElement('button');
      btn.className = 'dose-btn' + (i === 0 ? ' active' : '');
      btn.innerHTML = `<div class="dose-name">${d.name}</div><div class="dose-ratio">${d.coffee}g / ${d.water}g</div>`;
      btn.onclick = () => setDose(i);
      container.appendChild(btn);
    });
  }

  function setDose(idx) {
    currentDose  = idx;
    const doses  = RECIPES[currentRecipe].doses;
    document.querySelectorAll('.dose-btn').forEach((btn, i) => btn.classList.toggle('active', i === idx));
    const dose   = doses[idx];
    customCoffee = dose.coffee;
    customWater  = dose.water;
    currentRatio = dose.water / dose.coffee;
    updateRecipeDisplay();
  }

  function updateRecipeDisplay() {
    document.getElementById('rc-coffee').textContent = customCoffee;
    document.getElementById('rc-water').textContent  = customWater;
    updateTargetDisplay();
  }

  function adjustCoffee(delta) {
    customCoffee = Math.max(5, customCoffee + delta);
    customWater  = Math.round(customCoffee * currentRatio);
    currentDose  = -1;
    document.querySelectorAll('.dose-btn').forEach(btn => btn.classList.remove('active'));
    updateRecipeDisplay();
  }

  function adjustWater(delta) {
    customWater  = Math.max(85, customWater + delta);
    customCoffee = Math.max(5, Math.round(customWater / currentRatio));
    currentDose  = -1;
    document.querySelectorAll('.dose-btn').forEach(btn => btn.classList.remove('active'));
    updateRecipeDisplay();
  }

  function setGrind(idx) {
    currentGrind = idx;
    document.querySelectorAll('.grind-pill').forEach((btn, i) => btn.classList.toggle('active', i === idx));
    try { localStorage.setItem('v60-grind', idx); } catch (e) {}
  }

  // ── DYNAMIC RECIPE ──────────────────────────────────────────────────
  function getSteps() {
    return RECIPES[currentRecipe].getSteps(customCoffee, customWater);
  }

  // ── TRACK ───────────────────────────────────────────────────────────
  function buildTrack() {
    stepsTrack.innerHTML = '';
    STEPS.forEach((s, i) => {
      const seg  = document.createElement('div');
      seg.className = `track-seg ${s.type}`;
      seg.id = `track-${i}`;
      const fill = document.createElement('div');
      fill.className = 'track-seg-fill';
      seg.appendChild(fill);
      stepsTrack.appendChild(seg);
    });
  }

  function updateTrack() {
    STEPS.forEach((_, i) => {
      const seg = document.getElementById(`track-${i}`);
      seg.classList.remove('complete', 'active');
      if (i < currentStepIdx)       seg.classList.add('complete');
      else if (i === currentStepIdx) seg.classList.add('active');
    });
  }

  // ── STEP UI ─────────────────────────────────────────────────────────
  function applyStepUI(idx) {
    const s      = STEPS[idx];
    const isLast = idx === STEPS.length - 1;

    stepDisplay.className = `step-display ${s.type}`;
    stepTag.className     = `step-type-tag ${s.type}`;
    stepTag.textContent   = s.tag;
    stepInstr.textContent = s.instruction;
    stepWeight.textContent = s.weight || '';
    stepCounter.textContent = `Step ${idx + 1} of ${STEPS.length}`;

    const next = STEPS[idx + 1];
    nextStepBox.style.visibility = next ? 'visible' : 'hidden';
    if (next) nextStepText.textContent = `${next.tag} — ${next.instruction.split('.')[0]}.`;

    brewCircle.className = `circle-wrap${s.type === 'pour' ? ' pouring' : ''}`;

    const colors = { pour: 'var(--pour)', wait: 'var(--wait)', swirl: 'var(--swirl)' };
    ringProgress.style.stroke = colors[s.type] || 'var(--wait)';

    brewLabel.textContent = isLast ? 'elapsed' : 'remaining';

    skipBtn.textContent = isLast ? 'Finish' : 'Skip →';
  }

  // ── TICK ────────────────────────────────────────────────────────────
  function tick() {
    const elapsed    = now();
    const stepElapsed = elapsed - stepStartTime;
    const s          = STEPS[currentStepIdx];
    const isLast     = currentStepIdx === STEPS.length - 1;

    // auto-advance non-last steps
    if (!isLast && stepElapsed >= s.duration) {
      moveToStep(currentStepIdx + 1, elapsed);
      return;
    }

    // timers
    brewTimer.textContent = isLast ? fmtTime(stepElapsed) : fmtTime(Math.max(0, s.duration - stepElapsed));
    brewTotal.textContent = fmtTime(elapsed) + ' total';

    // last step: ring turns green once target duration is hit
    if (isLast && stepElapsed >= s.duration) {
      ringProgress.style.stroke = 'var(--done)';
    }

    // ring
    const fraction = Math.min(stepElapsed / s.duration, 1);
    ringProgress.style.strokeDasharray  = CIRCUMFERENCE;
    ringProgress.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);

    updateTrack();
    rafId = requestAnimationFrame(tick);
  }

  // ── NAVIGATION ──────────────────────────────────────────────────────
  function moveToStep(idx, atElapsed) {
    currentStepIdx = idx;
    stepStartTime  = atElapsed;
    stepEntryElapsed.push(atElapsed);
    playStepChime();
    vibe([80]);
    applyStepUI(idx);
    updateTrack();
    rafId = requestAnimationFrame(tick);
  }

  function skipStep() {
    cancelAnimationFrame(rafId);
    const t = now();
    if (currentStepIdx >= STEPS.length - 1) { showRecap(t); return; }
    moveToStep(currentStepIdx + 1, t);
  }

  // ── PAUSE ───────────────────────────────────────────────────────────
  function togglePause() {
    if (!startTime) return;
    paused = !paused;
    if (paused) {
      cancelAnimationFrame(rafId);
      pauseStartMs = Date.now();
      brewCircle.classList.add('paused');
    } else {
      pausedTotalMs += Date.now() - pauseStartMs;
      pauseStartMs = null;
      brewCircle.classList.remove('paused');
      rafId = requestAnimationFrame(tick);
    }
  }

  brewCircle.addEventListener('click', togglePause);
  skipBtn.addEventListener('click', skipStep);

  // ── RECAP ───────────────────────────────────────────────────────────
  function showRecap(totalSecs) {
    releaseWakeLock();
    saveHistory(totalSecs);
    playDoneChime();
    vibe([100, 60, 100, 60, 200]);

    const v = verdictInfo(totalSecs);
    document.getElementById('recap-time').textContent = fmtTime(totalSecs);
    const vEl = document.getElementById('recap-verdict');
    vEl.textContent = v.text;
    vEl.className   = `recap-verdict ${v.cls}`;

    const tips = {
      bad_fast:  '<strong>Try a finer grind.</strong> Water moved through too quickly — go noticeably finer and re-dial to hit the target window.',
      warn_fast: '<strong>Small adjustment needed.</strong> Dial your grind slightly finer to slow the drawdown into the target window.',
      good:      '<strong>Perfect drawdown.</strong> Keep that grind setting. If flavour feels weak, try hotter water or slightly finer. If bitter, try cooler or coarser.',
      warn_slow: '<strong>Small adjustment needed.</strong> Dial your grind slightly coarser to speed the drawdown into the target window.',
      bad_slow:  '<strong>Try a coarser grind.</strong> Water is struggling to drain — go noticeably coarser and re-dial to hit the target window.',
    };
    document.getElementById('recap-tip').innerHTML = tips[v.tip];

    const actualDurations = STEPS.map((_, i) => {
      const start = stepEntryElapsed[i] ?? 0;
      const end   = stepEntryElapsed[i + 1] ?? totalSecs;
      return end - start;
    });

    const rowsEl = document.getElementById('recap-rows');
    rowsEl.innerHTML = '';
    STEPS.forEach((s, i) => {
      const isLastStep = i === STEPS.length - 1;
      const row    = document.createElement('div');
      row.className = 'recap-row';
      const dot    = document.createElement('div');
      dot.className = `recap-dot ${s.type}`;
      const name   = document.createElement('div');
      name.className = 'recap-row-name';
      name.textContent = s.tag;
      const actual = document.createElement('div');
      actual.className = 'recap-row-actual';
      actual.textContent = fmtTime(actualDurations[i]);
      const tgt  = document.createElement('div');
      tgt.className = 'recap-row-target';
      tgt.textContent = isLastStep ? '' : `/ ~${fmtTime(s.duration)}`;
      row.append(dot, name, actual, tgt);
      rowsEl.appendChild(row);
    });

    const totalRow = document.createElement('div');
    totalRow.className = 'recap-total';
    totalRow.innerHTML = `<span class="recap-total-label">Total</span><span class="recap-total-time">${fmtTime(totalSecs)}</span>`;
    rowsEl.appendChild(totalRow);

    screenBrew.classList.remove('active');
    screenRecap.classList.add('active');
  }

  // ── CONTROLS ────────────────────────────────────────────────────────
  function startBrew() {
    unlockAudio();
    requestWakeLock();

    STEPS = getSteps();
    buildTrack();
    currentStepIdx   = 0;
    stepStartTime    = 0;
    stepEntryElapsed = [0];
    paused           = false;
    pauseStartMs     = null;
    pausedTotalMs    = 0;
    brewCircle.classList.remove('paused');
    startTime = Date.now();

    ringProgress.style.strokeDasharray  = CIRCUMFERENCE;
    ringProgress.style.strokeDashoffset = CIRCUMFERENCE;
    ringProgress.style.stroke = 'var(--pour)';

    screenIntro.classList.remove('active');
    screenBrew.classList.add('active');

    applyStepUI(0);
    updateTrack();
    rafId = requestAnimationFrame(tick);
  }

  function resetBrew() {
    cancelAnimationFrame(rafId);
    releaseWakeLock();
    paused = false;
    pauseStartMs = null;
    pausedTotalMs = 0;
    brewCircle.classList.remove('paused');
    startTime = null;
    screenBrew.classList.remove('active');
    screenRecap.classList.remove('active');
    loadHistory(); // refresh in case we just saved
    screenIntro.classList.add('active');
  }

  // ── INIT ────────────────────────────────────────────────────────────
  buildRecipePicker();
  setRecipe(0);
  const savedGrind = parseInt(localStorage.getItem('v60-grind') ?? '1');
  setGrind(isNaN(savedGrind) ? 1 : savedGrind);
  loadHistory();
</script>
</body>
</html>
